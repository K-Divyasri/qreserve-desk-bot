name: Slide test booking (loop)

on:
  workflow_dispatch:         # triggered once; the job then drives itself to
                             # completion internally, no repeated schedule
                             # triggers needed while it's running
    inputs:
      seed_id:
        description: "Manual escape hatch: adopt this existing reservation ID instead of creating a fresh one"
        required: false
        default: ""

jobs:
  slide-loop:
    runs-on: ubuntu-latest
    concurrency: slide-test
    timeout-minutes: 300     # comfortably under GitHub's 6h hard job cap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Restore slider state
        uses: actions/cache/restore@v4
        with:
          path: .slide_state.json
          key: slide-state-${{ github.run_id }}
          restore-keys: |
            slide-state-
      - name: Run slider loop
        run: python slide_test.py --loop
        env:
          QR_EMAIL: ${{ secrets.QR_EMAIL }}
          QR_PASSWORD: ${{ secrets.QR_PASSWORD }}
          QR_TZ: America/Toronto
          QR_SEED_ID: ${{ inputs.seed_id }}
      - name: Save slider state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .slide_state.json
          key: slide-state-${{ github.run_id }}
