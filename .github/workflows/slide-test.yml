name: Slide test booking (safety net)

on:
  schedule:
    # Hourly, single-step nudge -- a lightweight backup in case the main
    # slide-test-loop.yml job dies mid-run (network blip, runner issue).
    # At hourly spacing, GitHub's scheduler being a few minutes off barely
    # matters, unlike at 5-min spacing. Harmless no-op once start=10:00 or
    # while the main loop job is already actively running (same
    # concurrency group -- this just queues briefly behind it).
    - cron: "0 * * * *"
  workflow_dispatch: {}      # manual single-step runs

jobs:
  slide:
    runs-on: ubuntu-latest
    concurrency: slide-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Run slider
        run: python slide_test.py
        env:
          QR_EMAIL: ${{ secrets.QR_EMAIL }}
          QR_PASSWORD: ${{ secrets.QR_PASSWORD }}
          QR_TZ: America/Toronto
