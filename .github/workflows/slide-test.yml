name: Slide test booking

on:
  schedule:
    # Every 5 minutes (GitHub's minimum interval), around the clock. Each
    # run still advances the reservation by a fixed 30-min step, so this
    # just runs through the 36 steps faster (~3h total instead of ~18h).
    # slide_test.py is self-limiting: once start reaches 10:00, every later
    # run is a harmless no-op.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}      # manual test runs

jobs:
  slide:
    runs-on: ubuntu-latest
    concurrency: slide-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Run slider
        run: python slide_test.py
        env:
          QR_EMAIL: ${{ secrets.QR_EMAIL }}
          QR_PASSWORD: ${{ secrets.QR_PASSWORD }}
          QR_TZ: America/Toronto
