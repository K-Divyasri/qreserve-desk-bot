name: Slide test booking (safety net)

on:
  schedule:
    # Hourly -- a backup in case the main slide-test-loop.yml job dies
    # mid-run (network blip, runner issue). Relaunches a full loop (not
    # just one step) since at a 2-min step size, one-step-per-hour would
    # be far too slow to ever catch up. At hourly spacing, GitHub's
    # scheduler being a few minutes off barely matters, unlike at 2-min
    # spacing. Harmless no-op once start=10:00, and just queues briefly
    # behind the main loop job if that's still actively running (same
    # concurrency group).
    - cron: "0 * * * *"
  workflow_dispatch: {}      # manual runs

jobs:
  slide:
    runs-on: ubuntu-latest
    concurrency: slide-test
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Run slider loop
        run: python slide_test.py --loop
        env:
          QR_EMAIL: ${{ secrets.QR_EMAIL }}
          QR_PASSWORD: ${{ secrets.QR_PASSWORD }}
          QR_TZ: America/Toronto
